name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build v30 website with revised ACT 04
        run: python build/build_v26.py

      - name: Verify generated narrative assets
        run: |
          test -f _site/index.html
          test -f _site/narrative-v23.js
          test -f _site/feature-bridge-v24.js
          test -f _site/act3-v29.js
          test -f _site/act3-v29.css
          test -f _site/act4-v30.js
          test -f _site/act4-v30.css
          grep -q "narrative-v23.js?v=30" _site/index.html
          grep -q "act3-v29.js?v=30" _site/index.html
          grep -q "act4-v30.js?v=30" _site/index.html
          grep -q "act4-v30.css?v=30" _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
