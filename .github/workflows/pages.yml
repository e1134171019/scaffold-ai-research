name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Scheme 3 autonomous configuration website
        run: python build/build_v26.py

      - name: Verify generated standalone site
        run: |
          test -f _site/index.html
          test -f _site/.nojekyll
          echo "81363a9824f1c048311d06cfebd745c3d71c3d9cf4c24ff3f2e6685d4730725a  _site/index.html" | sha256sum --check --strict
          grep -q "Babylon.js網路3D工程檢視器" _site/index.html
          grep -q "ScaffoldLayout" _site/index.html
          grep -q "建築圖自主配置與數量產出" _site/index.html
          grep -q "scheme-candidate-generation" _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
