name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Scheme 2 Babylon.js website
        run: python build/build_v26.py

      - name: Verify generated standalone site
        run: |
          test -f _site/index.html
          test -f _site/.nojekyll
          echo "74749e41447ecf27cf1a2ded8cce0f2390047109f9f42026156bef1a5fe5c22f  _site/index.html" | sha256sum --check --strict
          grep -q "Babylon.js網路3D工程檢視器" _site/index.html
          grep -q "ScaffoldLayout" _site/index.html
          grep -q "把歷史建案，轉成AI看得懂、工程人員查得到的系統知識" _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
