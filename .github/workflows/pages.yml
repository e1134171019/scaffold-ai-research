name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Scheme 3 autonomous configuration website
        run: python build/build_v26.py

      - name: Inject ACT 02 twin scrollytelling
        run: python build/inject_act4_simulation_v45.py

      - name: Verify generated standalone site
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("_site/index.html")
          assert path.is_file(), "_site/index.html is missing"
          assert Path("_site/.nojekyll").is_file(), "_site/.nojekyll is missing"

          html = path.read_text(encoding="utf-8")

          required = [
              "Babylon.js網路3D工程檢視器",
              "ScaffoldLayout",
              "scheme1-update-v42",
              "scheme2-update-v43",
              "scheme3-update-v44",
              '<section class="section act2',
              '<section class="method-bridge',
              '<div class="case-stack">',
              '<section class="section act3 act3-v40"',
              "先從一張已完成的施工架 CAD，理解數量是怎麼形成的",
              "自主配置成立的條件",
              "act4-simulation-v45",
              "ACT 02 simulation placement v47",
              "document.querySelector('#act2')",
              "act2.appendChild(story)",
              "從人工配置稽核",
              "自主配置前的驗證",
              "act4TwinCanvasV45",
              "比較不是判決",
          ]
          missing = [marker for marker in required if marker not in html]
          assert not missing, f"Generated site markers are missing: {missing}"

          positions = [
              html.index('<section class="section act2'),
              html.index('<section class="method-bridge'),
              html.index('<div class="case-stack">'),
              html.index('<section class="section act3 act3-v40"'),
          ]
          assert positions == sorted(positions), positions

          counts = {
              "method_bridge": html.count('<section class="method-bridge'),
              "method_steps": html.count('class="method-step"'),
              "act2_role_cards": html.count('class="act2-role-card'),
              "act3_sections": html.count('class="section act3 act3-v40"'),
              "act3_inputs": html.count('class="act3-v40-input-card"'),
              "act3_gates": html.count('class="act3-v40-gate-card"'),
              "act3_outputs": html.count('OUTPUT 0'),
          }
          expected = {
              "method_bridge": 1,
              "method_steps": 3,
              "act2_role_cards": 2,
              "act3_sections": 1,
              "act3_inputs": 3,
              "act3_gates": 3,
              "act3_outputs": 3,
          }
          assert counts == expected, {"actual": counts, "expected": expected}
          print("Standalone narrative site verified", counts, positions)
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
