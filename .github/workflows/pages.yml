name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Scheme 3 autonomous configuration website
        run: python build/build_v26.py

      - name: Verify generated standalone site
        run: |
          test -f _site/index.html
          test -f _site/.nojekyll
          grep -q "Babylon.js網路3D工程檢視器" _site/index.html
          grep -q "ScaffoldLayout" _site/index.html
          grep -q "建築圖自主配置與數量產出" _site/index.html
          grep -q "scheme-candidate-generation" _site/index.html
          grep -q "act4-opening-v41" _site/index.html
          grep -q "01～03 先定義問題" _site/index.html
          grep -q "scheme1-update-v42" _site/index.html
          grep -q "EntityInventory" _site/index.html
          grep -q "不以圖層或人工總數作為答案" _site/index.html
          grep -q "scheme2-update-v43" _site/index.html
          grep -q "歷史人工圖面是觀察資料" _site/index.html
          grep -q "CadEntitySnapshot" _site/index.html
          grep -q "規則回歸" _site/index.html
          python - <<'PY'
          from pathlib import Path

          html = Path("_site/index.html").read_text(encoding="utf-8")
          markers = [
              "</head>",
              '<section class="section act2',
              '<section class="method-bridge',
              '<div class="case-stack">',
              '<section class="section act3',
          ]
          positions = [html.index(marker) for marker in markers]
          assert positions == sorted(positions), positions
          assert html.count('<section class="method-bridge') == 1
          assert html.count('class="method-step"') == 3
          assert html.count('建商給的是建築圖，不是施工架配置圖') == 1
          assert html.count('本案案例：已完成的傳統框式施工架配置') == 1
          assert html.count('class="act2-role-card') == 2
          assert html.count('class="act2-engineering-detail"') == 1
          assert html.count('ACT 02 v39') == 1
          assert html.count('class="section act3 act3-v40"') == 1
          assert html.count('class="act3-v40-input-card"') == 3
          assert html.count('class="act3-v40-gate-card"') == 3
          assert html.count('OUTPUT 0') == 3
          assert html.count('class="act3-v40-module-grid"') == 1
          assert html.count('scheme1-update-v42') >= 2
          assert html.count('EntityInventory') >= 1
          assert html.count('scheme2-update-v43') >= 2
          assert html.count('歷史人工圖面是觀察資料') >= 1
          assert html.count('CadEntitySnapshot') >= 1
          assert html.count('scheme2-v43-architecture') >= 1
          print("ACT 02 arrangement and ACT 03 structure verified", positions)
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
