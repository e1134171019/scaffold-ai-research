<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>施工架配置數位化研究</title>
  <style>
    :root{color-scheme:light;--ink:#26322c;--paper:#eee8df;--card:#fffdf8;--accent:#c56f3d;--muted:#687169}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:32px}.card{width:min(840px,100%);padding:clamp(28px,6vw,70px);border:1px solid #d9d1c5;border-radius:28px;background:var(--card);box-shadow:0 30px 90px rgba(38,50,44,.12)}
    .eyebrow{color:var(--accent);font-size:12px;font-weight:800;letter-spacing:.14em}.status{display:inline-block;margin-top:22px;padding:7px 12px;border-radius:999px;background:#e3ebe1;color:#315d49;font-size:12px;font-weight:800}
    h1{margin:18px 0;font-size:clamp(42px,8vw,82px);line-height:1.02;letter-spacing:-.055em}p{max-width:690px;color:var(--muted);font-size:17px;line-height:1.8}
    .flow{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px}.flow span{padding:10px 13px;border-radius:12px;background:#eee6dc;font-size:13px;font-weight:700}
    footer{margin-top:36px;padding-top:20px;border-top:1px solid #ddd5ca;color:#7e827d;font-size:12px}
  </style>
</head>
<body>
<main>
  <section class="card">
    <div class="eyebrow">SCAFFOLD CONFIGURATION DIGITALIZATION RESEARCH</div>
    <div class="status">GitHub Pages 正在部署</div>
    <h1>施工架配置<br>數位化研究</h1>
    <p>研究如何從 CAD 建築圖面辨識施工架工程特徵，建立可計算、可驗證與可追溯的規則核心，並逐步形成 AutoCAD 即時稽核、離線批次驗證與施工架自動生成三種方案。</p>
    <div class="flow">
      <span>客戶需求</span><span>施工架工程特徵</span><span>CAD 資料規則</span><span>三種開發方案</span><span>規則化總結</span>
    </div>
    <footer>Pages 部署已於 2026-07-17 重新觸發。</footer>
  </section>
</main>
</body>
</html>
